<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BioGuard - Luxury Biometric Protection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "yale-blue": "#131E3A",
                        "soft-glow": "#2563eb",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "serif": ["Cinzel", "serif"],
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .bg-aurora {
                background: radial-gradient(circle at 50% 50%, #1a2a4d 0%, #131E3A 100%);
                position: relative;
                overflow: hidden;
            }
            .aurora-element {
                position: absolute;
                border-radius: 50%;
                filter: blur(80px);
                opacity: 0.15;
                z-index: 0;
                animation: aurora-shift 20s ease-in-out infinite alternate;
            }
            @keyframes aurora-shift {
                0% { transform: translate(-10%, -10%) scale(1); }
                100% { transform: translate(15%, 15%) scale(1.2); }
            }
            .button-glass {
                @apply relative px-12 py-3.5 rounded-none border border-white/10 text-[10px] tracking-[0.3em] uppercase transition-all duration-700 overflow-hidden;
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(12px);
            }
            .button-glass:hover {
                @apply border-white/40 text-white;
                box-shadow: 0 0 30px rgba(37, 99, 235, 0.15);
                background: rgba(255, 255, 255, 0.07);
            }.animate-subtitle {
                animation: fadeIn 1.5s ease-out forwards;
            }
            .animate-headline {
                opacity: 0;
                animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                animation-delay: 0.5s;
            }
            .animate-buttons {
                opacity: 0;
                animation: fadeIn 1.5s ease-out forwards;
                animation-delay: 1s;
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }
    </style>
</head>
<body class="bg-yale-blue font-sans text-slate-200 antialiased selection:bg-soft-glow/30">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center bg-aurora">
<div class="absolute inset-0 pointer-events-none">
<div class="aurora-element top-[-10%] left-[-5%] w-[60vw] h-[60vw] bg-blue-900"></div>
<div class="aurora-element bottom-[-10%] right-[-5%] w-[50vw] h-[50vw] bg-indigo-900" style="animation-duration: 25s; animation-direction: alternate-reverse;"></div>
</div>
<header class="fixed top-0 left-0 w-full flex items-center justify-between px-10 py-10 z-50">
<div class="flex items-center gap-4 opacity-70">
<span class="material-symbols-outlined text-white font-extralight text-xl">fingerprint</span>
<span class="text-white text-[10px] font-medium tracking-[0.5em] uppercase">BioGuard</span>
</div>
<div class="hidden md:block">
<button class="text-white/40 text-[9px] tracking-[0.4em] uppercase hover:text-white transition-colors duration-500">
                    Menu
                </button>
</div>
</header>
<main class="relative z-10 flex flex-col items-center text-center px-6 max-w-4xl">
<span class="animate-subtitle text-[10px] md:text-[11px] font-normal tracking-[0.6em] uppercase text-slate-400 mb-10 block">
                Your Health, Our Priority.
            </span>
<h1 class="animate-headline font-serif text-white text-5xl md:text-7xl lg:text-8xl leading-[1.1] mb-16 tracking-[0.05em]">
                ADVANCED <br/>
                BIOMETRIC <br/>
<span class="font-light italic opacity-90">PROTECTION.</span>
</h1>
<div class="animate-buttons flex flex-col sm:flex-row items-center gap-8">
<button class="button-glass text-white">
                    Initialize Setup
                </button>
<button class="button-glass text-slate-400">
                    Explore Technology
                </button>
</div>
</main>
<footer class="fixed bottom-0 w-full px-10 py-10 flex flex-col md:flex-row items-center justify-between text-[8px] md:text-[9px] uppercase tracking-[0.5em] text-slate-500 z-50">
<div class="flex items-center gap-8">
<div class="flex items-center gap-3">
<div class="w-1 h-1 bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.8)]"></div>
<span>Encrypted Connection</span>
</div>
<span class="hidden sm:inline">V.1.0 — 2024</span>
</div>
<div class="mt-4 md:mt-0 flex gap-8">
<a class="hover:text-white transition-colors duration-500" href="#">Legal</a>
<a class="hover:text-white transition-colors duration-500" href="#">Privacy</a>
</div>
</footer>

</div>

</body></html>
